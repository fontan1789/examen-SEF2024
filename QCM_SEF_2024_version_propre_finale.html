<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#1a1a2e;min-height:100vh}
.hdr{background:linear-gradient(135deg,#1b3a6b,#2e5fa3);color:#fff;padding:1rem 1.5rem;position:sticky;top:0;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr h1{font-size:1.25rem;font-weight:700}
.hdr p{font-size:.8rem;opacity:.75;margin-top:2px}
.pb{height:5px;background:rgba(255,255,255,.2);border-radius:3px;margin-top:.5rem}
.pf{height:5px;background:#4ade80;border-radius:3px;transition:width .3s}
.sb{display:flex;gap:8px;padding:.5rem 1.5rem;background:#fff;border-bottom:1px solid #e2e8f0;flex-wrap:wrap}
.chip{flex:1;min-width:65px;text-align:center;padding:.3rem;background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px}
.chip .lb{font-size:10px;color:#64748b;font-weight:500}
.chip .vl{font-size:1.15rem;font-weight:700;color:#1b3a6b}
.cn{padding:.5rem 1.5rem;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;gap:5px;flex-wrap:wrap}
.cb{padding:3px 9px;font-size:11px;border:1px solid #cbd5e1;border-radius:14px;background:transparent;color:#475569;cursor:pointer}
.cb.active{background:#1b3a6b;color:#fff;border-color:#1b3a6b;font-weight:600}
.cb.done{background:#dcfce7;color:#166534;border-color:#bbf7d0}
.main{max-width:800px;margin:0 auto;padding:1rem}
.jn{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.75rem}
.jb{width:29px;height:29px;display:flex;align-items:center;justify-content:center;font-size:11px;border:1px solid #cbd5e1;border-radius:5px;background:#fff;cursor:pointer;font-weight:500}
.jb.cur{border-color:#1b3a6b;color:#1b3a6b;font-weight:700;background:#eff6ff}
.jb.ok{background:#dcfce7;border-color:#86efac;color:#166534}
.jb.ko{background:#fee2e2;border-color:#fca5a5;color:#991b1b}
.qc{background:#fff;border-radius:12px;box-shadow:0 1px 5px rgba(0,0,0,.07);overflow:hidden;margin-bottom:.75rem}
.qm{display:flex;justify-content:space-between;align-items:center;padding:.6rem 1rem;border-bottom:1px solid #f1f5f9}
.qi{font-size:12px;font-weight:600;color:#64748b}
.qch{font-size:11px;padding:2px 8px;background:#eff6ff;color:#1d4ed8;border-radius:9px;font-weight:500}
.qb{padding:1rem}
.hand{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;background:#f8fafc;border-radius:9px;padding:9px;margin-bottom:.75rem;border:1px solid #e2e8f0}
.sb2{padding:6px 8px;background:#fff;border-radius:6px;border:1px solid #e8ecf0}
.sm{font-size:16px;font-weight:700;display:block}
.sc{font-size:13px;font-weight:500;margin-top:2px;display:block;word-break:break-all;min-height:16px}
.red{color:#dc2626}
.hl{grid-column:1/-1;text-align:center;font-size:11px;color:#64748b;padding-top:5px;border-top:1px solid #e2e8f0;font-style:italic}
.seq{background:#eff6ff;border-left:4px solid #3b82f6;border-radius:0 7px 7px 0;padding:6px 11px;margin-bottom:.6rem;font-size:13px;color:#1e40af;font-style:italic}
.qt{font-size:.9rem;font-weight:700;color:#1a1a2e;margin-bottom:.75rem;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:5px}
.opt{display:flex;align-items:center;gap:9px;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;text-align:left;font-size:13px;color:#1a1a2e;width:100%}
.opt:hover:not([disabled]){background:#f8fafc;border-color:#94a3b8}
.opt[disabled]{cursor:default}
.opt .lt{font-weight:700;min-width:18px;font-size:12px;color:#64748b}
.opt.ok2{background:#f0fdf4;border-color:#22c55e;color:#166534}
.opt.ok2 .lt{color:#16a34a}
.opt.ko2{background:#fef2f2;border-color:#f87171;color:#991b1b}
.opt.ko2 .lt{color:#dc2626}
.ck{margin-left:auto;font-weight:700}
.cmt{display:none;margin-top:.6rem;padding:9px 12px;border-left:4px solid #22c55e;border-radius:0 7px 7px 0;font-size:12px;color:#374151;line-height:1.6;background:#f0fdf4}
.cmt.show{display:block}
.cmt.err{border-color:#f87171;background:#fef2f2}
.nr{display:flex;justify-content:space-between;align-items:center;margin-top:.75rem}
.nb{padding:7px 16px;font-size:13px;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;color:#1a1a2e;cursor:pointer;font-weight:500}
.nb:disabled{opacity:.35;cursor:default}
.nb.pr{background:#1b3a6b;color:#fff;border-color:#1b3a6b}
.nc{font-size:11px;color:#64748b}
.res{text-align:center;padding:2rem 1rem;display:none}
.res.show{display:block}
.rs{font-size:4.5rem;font-weight:800;color:#1b3a6b;line-height:1}
.rm{font-size:1rem;color:#64748b;margin:.4rem 0 1.5rem}
.rg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-width:480px;margin:0 auto 1.5rem}
.rc{background:#fff;border-radius:9px;padding:10px 13px;border:1px solid #e2e8f0;text-align:left}
.rn{font-size:11px;color:#64748b;margin-bottom:2px}
.rv{font-size:1rem;font-weight:700}
.gr .rv{color:#16a34a}.go .rv{color:#ca8a04}.gp .rv{color:#dc2626}
.ra{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
@media(max-width:540px){.hand{grid-template-columns:repeat(2,1fr)}.hl{grid-column:1/-1}}
</style>
</head>

<script>
var D=[{"id": 1, "chapter": "Présentation & Évaluation", "hand": {"spades": "AV93", "hearts": "RD5", "diamonds": "V82", "clubs": "D74", "hcp": 13, "hld": 13}, "question": "Combien de points comptez-vous pour évaluer cette main en SEF 2024 ?", "sequence": "", "options": ["A) 13 H", "B) 14 HL", "C) 13 HL", "D) 15 HLD"], "correct": "C", "comment": "Le SEF 2024 utilise les points HL (Honneur + Longueur) pour les ouvertures SA et HLD (+ Distribution) pour les mains à courte. Cette main est équilibrée : pas de majoration, 13 H = 13 HL. La distinction H/HL/HLD est fondamentale dans le SEF."}, {"id": 2, "chapter": "Présentation & Évaluation", "hand": {"spades": "D8743", "hearts": "A", "diamonds": "RV52", "clubs": "A83", "hcp": 14, "hld": 15}, "question": "Quelle est la valeur HLD de cette main avec fit pique (partenaire a ouvert 1♠) ?", "sequence": "1♠ – Passe – ?", "options": ["A) 13 HLD", "B) 16 HLD", "C) 14 HLD", "D) 15 HLD"], "correct": "B", "comment": "En HLD avec fit, on ajoute la valeur de distribution : singleton = 3 pts, doubleton = 1 pt. Ici singleton ♥ = +3 pts. Main : 13 H + 1 (5e pique) + 3 (singleton cœur) = 16 HLD. Le SEF 2024 insiste sur l'évaluation HLD pour les mains à fit."}, {"id": 3, "chapter": "Présentation & Évaluation", "hand": {"spades": "R7", "hearts": "AD95", "diamonds": "RD83", "clubs": "V62", "hcp": 15, "hld": 15}, "question": "Cette main est-elle ouvrable en 1SA selon le SEF 2024 ?", "sequence": "", "options": ["A) Non, trop forte pour 1SA", "B) Oui, 15-17 HL équilibrée", "C) Non, il faut ouvrir 1♥", "D) Oui mais il faut 4-4-3-2 exactement"], "correct": "B", "comment": "Le 1SA SEF 2024 décrit une main de 15-17 HL, distribution équilibrée (4-3-3-3, 4-4-3-2 ou 5-3-3-2 avec mineure). Cette main 4-4-3-2 à 16 H = 16 HL est parfaite pour 1SA. L'ouverture 1SA est l'enchère la plus précise du système."}, {"id": 4, "chapter": "Présentation & Évaluation", "hand": {"spades": "52", "hearts": "AV843", "diamonds": "RD6", "clubs": "R93", "hcp": 13, "hld": 14}, "question": "Quelle est la force en HL de cette main ?", "sequence": "", "options": ["A) 14 HL", "B) 15 HL", "C) 16 HL", "D) 13 HL"], "correct": "A", "comment": "Avec 13 H et une couleur de 5 cartes, on ajoute 1 point de longueur (la 5e carte). Total : 13 H + 1 L = 14 HL. En SEF 2024, les points HL servent notamment à calibrer l'ouverture de 1SA et les mains semi-régulières."}, {"id": 5, "chapter": "Présentation & Évaluation", "hand": {"spades": "A", "hearts": "RD9432", "diamonds": "AV7", "clubs": "D52", "hcp": 16, "hld": 18}, "question": "Quelle est la valeur HLD de cette main avec fit cœur ?", "sequence": "1♥ – Passe – 2♥ – Passe – ?", "options": ["A) 15 HLD", "B) 17 HLD", "C) 18 HLD", "D) 16 HLD"], "correct": "C", "comment": "Avec fit, on valorise : 6 cœurs = +2 HL, singleton ♠ = +3 pts distribution. Total : 15 H + 2 (6e-7e cœur comptés individuellement : 5e=+1, 6e=+1) + 3 (singleton) = 18 HLD. Une main à 18 HLD avec fit est une main de manche assurée."}, {"id": 6, "chapter": "Présentation & Évaluation", "hand": {"spades": "RD73", "hearts": "A62", "diamonds": "V84", "clubs": "R93", "hcp": 13, "hld": 13}, "question": "Peut-on ouvrir cette main selon le SEF 2024 ?", "sequence": "", "options": ["A) Non, il faut 14 H minimum", "B) Oui, 12 H suffisent", "C) Oui, mais seulement en 3e position", "D) Non, main trop équilibrée"], "correct": "B", "comment": "Le SEF 2024 fixe la force minimale d'ouverture à 12 H (ou 11 H avec belle distribution). Cette main à 13 H ouvre normalement de 1♠ (4+ piques). La règle des 12 H est la base du système d'ouvertures SEF."}, {"id": 7, "chapter": "Présentation & Évaluation", "hand": {"spades": "V9832", "hearts": "AD4", "diamonds": "R5", "clubs": "V73", "hcp": 11, "hld": 12}, "question": "Cette main de 11 H peut-elle ouvrir en SEF 2024 ?", "sequence": "", "options": ["A) Non, 12 H minimum", "B) Oui, 11 H + belle distribution", "C) Oui, seulement 1SA", "D) Non, jamais moins de 12 H"], "correct": "B", "comment": "Le SEF 2024 autorise l'ouverture à 11 H avec une belle distribution. Ici 5 piques + 2 As = main offensive. On ouvre 1♠. La règle des '11 H distribués' permet d'ouvrir des mains bicolores ou unicolores solides légèrement en dessous des 12 H."}, {"id": 8, "chapter": "Présentation & Évaluation", "hand": {"spades": "D82", "hearts": "R73", "diamonds": "AV4", "clubs": "D952", "hcp": 12, "hld": 12}, "question": "Que faites-vous avec cette main ?", "sequence": "", "options": ["A) 1♦", "B) 1♣", "C) 1SA", "D) Passe"], "correct": "B", "comment": "Avec 12 H, la main s'ouvre. En SEF 2024, 1♣ couvre les mains équilibrées sans majeure 4e ouvrable ni 4e carreau. La main n'entre pas dans la zone de 1SA (15-17 HL)."}, {"id": 9, "chapter": "Présentation & Évaluation", "hand": {"spades": "ARV652", "hearts": "D4", "diamonds": "R83", "clubs": "V7", "hcp": 14, "hld": 16}, "question": "Quelle est la force HL de cette main unicolore pique ?", "sequence": "", "options": ["A) 14 HL", "B) 15 HL", "C) 16 HL", "D) 17 HL"], "correct": "C", "comment": "Pour une couleur de 6 cartes : +2 points de longueur (5e et 6e cartes = +1 chacune). Total : 14 H + 2 L = 16 HL. Cette main ouvre 1♠. Dans le SEF, les points de longueur reflètent la puissance offensive des longues couleurs."}, {"id": 10, "chapter": "Présentation & Évaluation", "hand": {"spades": "R8", "hearts": "AV7", "diamonds": "RD943", "clubs": "V62", "hcp": 14, "hld": 15}, "question": "Cette main ouvre 1♦ ou 1SA ?", "sequence": "", "options": ["A) 1SA, main équilibrée 15-17 HL", "B) 1♦, les 5 carreaux priment", "C) 1♦ puis rebid SA", "D) 1SA si les carreaux sont solides"], "correct": "A", "comment": "Distribution 5-3-3-2 avec mineure : le SEF 2024 autorise l'ouverture 1SA avec une mineure 5e. Cette main à 16 HL est parfaitement décrite par 1SA. L'ouverture 1SA avec 5 carreaux est une règle explicite du SEF 2024 (simplification par rapport aux anciennes recommandations)."}, {"id": 11, "chapter": "Présentation & Évaluation", "hand": {"spades": "AV4", "hearts": "RD73", "diamonds": "A852", "clubs": "93", "hcp": 14, "hld": 14}, "question": "Quelle ouverture choisissez-vous ?", "sequence": "", "options": ["A) 1SA", "B) 1♥", "C) 1♦", "D) 1♣"], "correct": "C", "comment": "En SEF 2024, une ouverture en majeure promet 5 cartes ou plus. Avec seulement 4 cœurs, on ne peut donc pas ouvrir 1♥. La bonne ouverture est 1♦, meilleure mineure. Le 1SA n'est pas possible car la main est trop faible pour la zone 15-17 HL."}, {"id": 12, "chapter": "Présentation & Évaluation", "hand": {"spades": "D93", "hearts": "R7", "diamonds": "AV862", "clubs": "RD4", "hcp": 15, "hld": 16}, "question": "Avec cette main en 3e position (deux passes), comment ouvrez-vous ?", "sequence": "Passe – Passe – ?", "options": ["A) 1♦ identique à toute autre position", "B) 1SA si la force le permet", "C) On peut alléger légèrement en 3e position", "D) Passe, la manche est peu probable"], "correct": "C", "comment": "En 3e position après deux passes, le SEF 2024 permet d'alléger les conditions d'ouverture (on peut ouvrir à 10-11 H avec belle distribution). Ici 16-17 H, on ouvre normalement 1♦. La 3e position est souvent plus offensive car le partenaire a passé mais peut avoir 8-10 H."}, {"id": 13, "chapter": "Ouvertures mineures 1♣ 1♦", "hand": {"spades": "A93", "hearts": "RD5", "diamonds": "V82", "clubs": "AD74", "hcp": 16, "hld": 16}, "question": "Quelle est la bonne ouverture avec cette main équilibrée ?", "sequence": "", "options": ["A) 1♣", "B) 1SA", "C) 1♦", "D) 1♥"], "correct": "B", "comment": "Avec une main équilibrée 15-17 HL, l'ouverture 1SA est prioritaire sur toute ouverture en couleur. Cette main 4-3-3-3 à 15 H = 15 HL est parfaitement décrite par 1SA. En SEF 2024, le 1SA précède l'ouverture mineure même avec 4 trèfles."}, {"id": 14, "chapter": "Ouvertures mineures 1♣ 1♦", "hand": {"spades": "V73", "hearts": "A8", "diamonds": "RD952", "clubs": "D63", "hcp": 12, "hld": 13}, "question": "Quelle est l'ouverture correcte ?", "sequence": "", "options": ["A) 1♣", "B) 1♦", "C) Passe", "D) 1SA"], "correct": "B", "comment": "Avec 5 carreaux et 12 H, on ouvre 1♦. L'ouverture 1♦ en SEF promet 4 cartes minimum. Ici 5 carreaux avec 12 H (13 HL), l'ouverture est normale. On ne passe pas avec 12 H et on ne peut pas ouvrir 1SA (force insuffisante)."}, {"id": 15, "chapter": "Ouvertures mineures 1♣ 1♦", "hand": {"spades": "AD5", "hearts": "RV3", "diamonds": "V62", "clubs": "D742", "hcp": 13, "hld": 13}, "question": "Cette main ouvre 1♣ ou 1♦ ?", "sequence": "", "options": ["A) 1♦ car les carreaux sont meilleurs", "B) 1♣ car 4 trèfles et 3 carreaux seulement", "C) 1SA, main équilibrée", "D) 1♣ car on ouvre toujours la mineure la plus longue"], "correct": "B", "comment": "L'ouverture 1♦ exige 4 cartes minimum. Ici 3 carreaux seulement : on ouvre 1♣ (4 trèfles). Le SEF 2024 est clair : 1♦ = 4+ carreaux, sinon on ouvre 1♣ qui peut être court. La main à 13 H n'est pas assez forte pour 1SA (15-17 HL)."}, {"id": 16, "chapter": "Ouvertures mineures 1♣ 1♦", "hand": {"spades": "D83", "hearts": "V5", "diamonds": "ARD62", "clubs": "A94", "hcp": 16, "hld": 17}, "question": "Partenaire répond 1♥ à votre 1♦. Que rebidez-vous ?", "sequence": "1♦ – Passe – 1♥ – Passe – ?", "options": ["A) 1SA (15-17)", "B) 2♦ (6 carreaux)", "C) 2♥ (soutien)", "D) 2SA (invitation)"], "correct": "A", "comment": "Avec une main équilibrée 15-17 HL, le rebid naturel est 1SA. Le SEF 2024 définit précisément : après 1♦ – 1♥, le rebid 1SA montre 15-17 HL équilibrée sans soutien 4e en cœur. C'est la description la plus précise de cette main."}, {"id": 17, "chapter": "Ouvertures mineures 1♣ 1♦", "hand": {"spades": "A8", "hearts": "RD73", "diamonds": "V952", "clubs": "AD6", "hcp": 16, "hld": 16}, "question": "Quelle est votre ouverture ?", "sequence": "", "options": ["A) 1♥ (majeure)", "B) 1♦ (4 carreaux)", "C) 1SA (équilibrée 15-17)", "D) 1♣"], "correct": "C", "comment": "Avec 4 cœurs, 4 carreaux et 16 HL équilibrée, on ouvre 1SA. En SEF 2024, une main équilibrée 15-17 HL ouvre TOUJOURS 1SA, même avec une majeure 4e. C'est une règle fondamentale : le 1SA prime sur les ouvertures en couleur pour les mains équilibrées dans la fourchette."}, {"id": 18, "chapter": "Ouvertures mineures 1♣ 1♦", "hand": {"spades": "R93", "hearts": "V7", "diamonds": "ARD85", "clubs": "D43", "hcp": 15, "hld": 16}, "question": "Après 1♦ de votre part, partenaire répond 2♦ (soutien). Que rebidez-vous ?", "sequence": "1♦ – Passe – 2♦ – Passe – ?", "options": ["A) Passe (minimum)", "B) 2SA (invitation)", "C) 3♦ (invitation)", "D) 3SA (manche)"], "correct": "C", "comment": "Le répondant montre 3+ carreaux, force limite basse (6-9 H). Avec 15-16 HL, on a de bonnes chances de manche. Le rebid 3♦ est une invitation (environ 15-17 H). En SEF, 2♦ soutien sur 1♦ est non-forcing ; l'ouvreur relance avec ses extras."}, {"id": 19, "chapter": "Ouvertures mineures 1♣ 1♦", "hand": {"spades": "AV2", "hearts": "RD4", "diamonds": "R93", "clubs": "AV73", "hcp": 18, "hld": 18}, "question": "Quelle est votre ouverture avec cette main forte ?", "sequence": "", "options": ["A) 1♣ puis rebid fort", "B) 2SA (20-21 H)", "C) 1SA (15-17 H)", "D) 2♣ (forte artificielle)"], "correct": "A", "comment": "19 H équilibrée : trop forte pour 1SA (15-17 HL), trop faible pour 2SA (20-21 H). On ouvre 1♣ puis on rebide 2SA (18-19 H) pour montrer la zone. En SEF 2024, la zone 18-19 H s'exprime par ouverture en couleur + rebid saut SA."}, {"id": 20, "chapter": "Ouvertures mineures 1♣ 1♦", "hand": {"spades": "D7", "hearts": "A83", "diamonds": "RV952", "clubs": "AD6", "hcp": 16, "hld": 17}, "question": "Après 1♦ – 1♠ – 2SA, que montre le rebid 2SA de l'ouvreur ?", "sequence": "1♦ – Passe – 1♠ – Passe – 2SA", "options": ["A) 12-14 H équilibrée", "B) 18-19 H équilibrée", "C) 15-17 H équilibrée", "D) 20-21 H équilibrée"], "correct": "B", "comment": "En SEF 2024, le rebid 2SA par l'ouvreur (après 1♦ – 1♠) montre 18-19 HL équilibrée. C'est une enchère forcing (invitation de manche) qui décrit précisément la zone intermédiaire forte. Le répondant passe avec minimum ou continue vers la manche."}, {"id": 21, "chapter": "Ouvertures mineures 1♣ 1♦", "hand": {"spades": "V82", "hearts": "A9", "diamonds": "RD4", "clubs": "AV752", "hcp": 15, "hld": 16}, "question": "Partenaire répond 1♠ à votre 1♣. Vous rebidez ?", "sequence": "1♣ – Passe – 1♠ – Passe – ?", "options": ["A) 1SA (15-17 HL)", "B) 2♣ (6 trèfles)", "C) 2♠ (soutien)", "D) 3♣ (bicolore fort)"], "correct": "A", "comment": "Main équilibrée 15-17 HL : rebid 1SA est idéal. Le SEF 2024 définit précisément le rebid 1SA après ouverture mineure : 15-17 HL, pas de soutien 4e dans la couleur du partenaire. Ici pas de soutien pique (2 cartes), on rebide 1SA naturellement."}, {"id": 22, "chapter": "Ouvertures mineures 1♣ 1♦", "hand": {"spades": "AV2", "hearts": "D3", "diamonds": "AD9762", "clubs": "R8", "hcp": 16, "hld": 18}, "question": "Partenaire répond 2♣ à votre ouverture de 1♦. Que montre cette réponse en SEF 2024 ?", "sequence": "1♦ – Passe – 2♣", "options": ["A) 6-9 H avec 3+ carreaux", "B) 10+ H avec 5+ trèfles, forcing manche", "C) 7-10 H équilibrée", "D) 11-12 H équilibrée, invitation"], "correct": "B", "comment": "Sur l'ouverture de 1♦, la réponse de 2♣ montre 10+ H et 5+ trèfles. C'est une réponse de type 2/1 forcing manche dans le SEF 2024."}, {"id": 23, "chapter": "Ouvertures mineures 1♣ 1♦", "hand": {"spades": "RD4", "hearts": "AV3", "diamonds": "R852", "clubs": "D73", "hcp": 15, "hld": 15}, "question": "Après votre ouverture de 1♦, que signifie la réponse 2SA ?", "sequence": "1♦ – Passe – 2SA", "options": ["A) 6-9 H avec 3+ carreaux", "B) 11-12 H équilibrée, invitation", "C) 10+ H avec 5+ trèfles, forcing manche", "D) 13-15 H équilibrée, manche directe"], "correct": "B", "comment": "Sur l'ouverture de 1♦, la réponse de 2SA montre une main équilibrée de 11 à 12 H et constitue une invitation à la manche."}, {"id": 24, "chapter": "Ouvertures mineures 1♣ 1♦", "hand": {"spades": "A93", "hearts": "V82", "diamonds": "D4", "clubs": "ARV73", hld": 18}, "question": "Après 1♠ – (2♥) – ?, que répond le partenaire avec 3 piques et 12 H ?", "sequence": "1♠ – (2♥) – ?", "options": ["A) 2SA (11-15 HLD, 3 atouts — nouveauté 2024)", "B) 3♠ (préemptif)", "C) Contre (force)", "D) 3♥ (cue-bid)"], "correct": "A", "comment": "Nouveauté majeure du SEF 2024 : après intervention adverse, 2SA = 3 atouts, 11-15 HLD. C'est une des plus importantes modifications du SEF 2024 par rapport au SEF 2018. Le 2SA fitté après intervention décrit précisément une main de soutien intermédiaire."}, {"id": 38, "chapter": "Ouvertures majeures 1♥ 1♠", "hand": {"spades": "AD3", "hearts": "RV9842", "diamonds": "V5", "clubs": "A7", "hcp": 15, "hld": 17}, "question": "Partenaire répond 3♥ (barrage) à votre 1♥. Que faites-vous avec 15 H ?", "sequence": "1♥ – Passe – 3♥ – Passe – ?", "options": ["A) Passe (barrage = non-forcing)", "B) 4♥ (manche avec extras)", "C) 3SA (alternative)", "D) 3♠ (cue-bid)"], "correct": "B", "comment": "Le 3♥ barrage montre 4+ atouts, 4-8 H. C'est non-forcing. Avec 15-16 H en face de 4+ atouts, la manche est raisonnable. On pousse à 4♥. En SEF 2024, l'ouvreur décide seul après un barrage : avec minimum (12-13 H) on passe, avec extras (14-17 H) on va à la manche."}, {"id": 39, "chapter": "Ouvertures majeures 1♥ 1♠", "hand": {"spades": "V9732", "hearts": "ARD4", "diamonds": "A6", "clubs": "82", "hcp": 14, "hld": 15}, "question": "Partenaire répond 2SA (invitation, 11-12 H) à votre 1♠. Que faites-vous ?", "sequence": "1♠ – Passe – 2SA – Passe – ?", "options": ["A) 3SA (manche)", "B) Passe (minimum)", "C) 4♠ (manche pique)", "D) 3♠ (invitation)"], "correct": "C", "comment": "Le 2SA = 11-12 H, équilibrée avec 2-3 atouts. Avec 15-16 H et 5 piques, la manche est claire. On choisit 4♠ plutôt que 3SA car on a un fit potentiel (si partenaire a 3 piques). En SEF, avec fit possible et main distribuée, la manche en majeure est préférable à 3SA."}, {"id": 40, "chapter": "Ouvertures majeures 1♥ 1♠", "hand": {"spades": "AV932", "hearts": "R7", "diamonds": "AD52", "clubs": "83", "hcp": 14, "hld": 15}, "question": "Partenaire répond 1SA (6-10 H) à votre 1♠. Que rebidez-vous ?", "sequence": "1♠ – Passe – 1SA – Passe – ?", "options": ["A) Passe (minimum)", "B) 2♦ (2e couleur)", "C) 2♠ (5 piques minimum)", "D) 2SA (16-17)"], "correct": "B", "comment": "Avec 5 piques + 4 carreaux et 14-15 H, le rebid 2♦ montre le bicolore. En SEF, après 1♠ – 1SA, le rebid dans une couleur nouvelle est non-forcing : le répondant choisit la couleur de fit ou passe. Le 2♦ décrit mieux la main qu'un rebid 2♠ (qui nierait le bicolore)."}, {"id": 41, "chapter": "Ouvertures majeures 1♥ 1♠", "hand": {"spades": "D2", "hearts": "ARD852", "diamonds": "R3", "clubs": "AV4", "hcp": 19, "hld": 21}, "question": "Quelle est l'ouverture et le développement avec cette main forte ?", "sequence": "", "options": ["A) 1♥ puis saut (bicolore fort)", "B) 2♣ (forte artificielle)", "C) 1♥ puis 3♥ (rebid fort)", "D) 2♥ (barrage fort)"], "correct": "B", "comment": "19 H avec 6 cœurs solides : cette main a 9 levées de jeu = forte artificielle. On ouvre 2♣. Le SEF 2024 : l'ouverture 2♣ est forte artificielle pour toute main de 22+ H OU avec 8-9 levées de jeu certaines. Après 2♣, on décrit naturellement (2♥ ou saut)."}, {"id": 42, "chapter": "Ouvertures majeures 1♥ 1♠", "hand": {"spades": "A8643", "hearts": "RV2", "diamonds": "AD7", "clubs": "93", "hcp": 14, "hld": 15}, "question": "En 3e position, vous ouvrez 1♠. Partenaire dit 2♣ Drury. Vous rebidez ?", "sequence": "Passe – Passe – 1♠ – Passe – 2♣ – Passe – ?", "options": ["A) 2♠ (ouverture légère — Drury inversé)", "B) 2♦ (espoir de manche)", "C) 3♠ (max 3e position)", "D) 2♥ (bicolore)"], "correct": "B", "comment": "Avec 14 H en 3e position, vous n'avez pas allégé votre ouverture : c'est une main normale. Le rebid 2♦ sur Drury = espoir de manche. Le SEF 2024 (Drury simplifié) : 2M = ouverture légère, 2♦ = espoir de manche, répétition avec saut = invite chelem."}, {"id": 43, "chapter": "Ouvertures majeures 1♥ 1♠", "hand": {"spades": "RD9842", "hearts": "A7", "diamonds": "R52", "clubs": "V3", "hcp": 13, "hld": 15}, "question": "En 3e position (deux passes), vous ouvrez 1♠. Partenaire dit 2♣ Drury (10-12 H, soutien). Rebid ?", "sequence": "Passe – Passe – 1♠ – Passe – 2♣ – Passe – ?", "options": ["A) 2♠ (ouverture légère)", "B) 2♦ (avec espoir manche)", "C) 3♠ (maximum)", "D) 4♠ (manche)"], "correct": "A", "comment": "Avec 12 H en 3e position, l'ouverture était légèrement allégée. Le rebid 2♠ Drury inversé = 'j'ai ouvert léger'. Le répondant passera avec mini ou insistera. SEF 2024 : la répétition de la majeure sur Drury = déni d'ouverture normale (ouverture légère ou tactique)."}, {"id": 44, "chapter": "Ouvertures majeures 1♥ 1♠", "hand": {"spades": "A", "hearts": "RD9852", "diamonds": "AV63", "clubs": "R4", "hcp": 17, "hld": 19}, "question": "Après une ouverture majeure, que montre un splinter (saut double en nouvelle couleur) ?", "sequence": "1♥/1♠ – … – Splinter", "options": ["A) Soutien quatrième + singleton ou chicane", "B) Main régulière 15-17 HL", "C) Barrage avec 5+ atouts", "D) Contrôle pour le chelem sans garantie de fit"], "correct": "A", "comment": "Le splinter est une enchère de saut double en nouvelle couleur. Il montre un fit d'au moins 4 cartes dans la majeure du partenaire et une courte (singleton ou chicane). Sa force exacte n'est pas strictement définie dans le SEF ; il s'agit d'une main distribuée orientée vers la manche, voire le chelem."}, {"id": 45, "chapter": "Ouverture 1SA", "hand": {"spades": "V82", "hearts": "ARD5", "diamonds": "R94", "clubs": "D72", "hcp": 15, "hld": 15}, "question": "Partenaire ouvre 1SA. Que répondez-vous avec cette main ?", "sequence": "1SA – Passe – ?", "options": ["A) 2♣ Stayman", "B) 2♦ (Texas ♥)", "C) 3SA (manche directe)", "D) 2SA (invitation)"], "correct": "A", "comment": "Avec 4 cœurs et 16 H, on utilise Stayman pour chercher le fit 4-4. Si partenaire répond 2♥ (4 cœurs), on va en 4♥. Si 2♦ ou 2♠, on rebide 3SA. Le SEF 2024 : Stayman = 4+ cartes dans une majeure, force variable (8+ H en général)."}, {"id": 46, "chapter": "Ouverture 1SA", "hand": {"spades": "D9852", "hearts": "V3", "diamonds": "AD4", "clubs": "R73", "hcp": 12, "hld": 13}, "question": "Partenaire ouvre 1SA. Que répondez-vous ?", "sequence": "1SA – Passe – ?", "options": ["A) 2SA (invitation)", "B) 2♥ (Texas pique)", "C) 3SA (manche)", "D) 2♣ (Stayman)"], "correct": "B", "comment": "Avec 5 piques et 12 H (manche certaine), on transfère en 2♥ (Texas pique → ouvreur dit 2♠). Puis on rebide 3SA (laissant ouvreur choisir entre 3SA et 4♠ selon son fit). En SEF 2024, le Texas est obligatoire avec 5+ cartes en majeure, quelle que soit la force."}, {"id": 47, "chapter": "Ouverture 1SA", "hand": {"spades": "V3", "hearts": "D8752", "diamonds": "R64", "clubs": "D82", "hcp": 8, "hld": 9}, "question": "Partenaire ouvre 1SA. Que répondez-vous avec cette main faible ?", "sequence": "1SA – Passe – ?", "options": ["A) 2♦ Texas cœur (signoff en 2♥)", "B) Passe (6-7 H)", "C) 2♣ Stayman", "D) 2SA (invitation)"], "correct": "A", "comment": "Avec 5 cœurs et 8 H, on transfère en 2♦ (Texas → 2♥) puis on passe : signoff en 2♥. En SEF 2024, le Texas permet d'arrêter à 2M avec une main faible à longue majeure, évitant le contrat de 1SA dans une main 5-3-3-2 difficile à jouer."}, {"id": 48, "chapter": "Ouverture 1SA", "hand": {"spades": "ARD4", "hearts": "V73", "diamonds": "R95", "clubs": "D82", "hcp": 15, "hld": 15}, "question": "Vous ouvrez 1SA. Partenaire dit 2♣ Stayman. Que répondez-vous ?", "sequence": "1SA – Passe – 2♣ – Passe – ?", "options": ["A) 2♦ (pas de majeure 4e)", "B) 2♠ (4 piques)", "C) 2♥ (4 cœurs)", "D) 2SA (4-4 majeures)"], "correct": "B", "comment": "Avec 4 piques et seulement 3 cœurs, on répond 2♠ au Stayman. En SEF 2024 : 2♦ = pas de majeure 4e, 2♥ = 4+ cœurs (peut avoir 4 piques aussi), 2♠ = 4+ piques SANS 4 cœurs. La hiérarchie Stayman permet au répondant de localiser le fit précisément."}, {"id": 49, "chapter": "Ouverture 1SA", "hand": {"spades": "RV4", "hearts": "AD93", "diamonds": "V72", "clubs": "RD5", "hcp": 16, "hld": 16}, "question": "Vous ouvrez 1SA. Partenaire dit 2♥ (Texas pique). Que répondez-vous ?", "sequence": "1SA – Passe – 2♥ – Passe – ?", "options": ["A) 2♠ (rectification obligatoire)", "B) 3♠ (super-acceptation, 4 piques)", "C) Passe (on joue 2♥)", "D) 2SA (équilibré)"], "correct": "A", "comment": "Après un Texas pique (2♥), la réponse standard de l'ouvreur est 2♠, rectification du transfert. Une super-acceptation peut être jouée sur accord de paire, mais elle ne fait pas partie du tronc commun obligatoire du SEF 2024."}, {"id": 50, "chapter": "Ouverture 1SA", "hand": {"spades": "A74", "hearts": "RD63", "diamonds": "AV5", "clubs": "D82", "hcp": 16, "hld": 16}, "question": "Vous ouvrez 1SA. Partenaire dit 4♣ Gerber. Que répondez-vous ?", "sequence": "1SA – Passe – 4♣ – Passe – ?", "options": ["A) 4♦ (0 ou 4 As)", "B) 4♥ (1 As)", "C) 4♠ (2 As)", "D) 4SA (3 As)"], "correct": "C", "comment": "Au Gerber (4♣ = demande d'As), les réponses sont : 4♦ = 0 ou 4 As, 4♥ = 1 As, 4♠ = 2 As, 4SA = 3 As. Cette main possède 2 As (A♠ et A♦), donc la réponse correcte est 4♠. En SEF 2024, le Gerber suit ce codage par paliers ascendants."}, {"id": 51, "chapter": "Ouverture 1SA", "hand": {"spades": "D83", "hearts": "V7", "diamonds": "ARD62", "clubs": "A94", "hcp": 16, "hld": 17}, "question": "Partenaire ouvre 1SA. Avec cette main en face, que faites-vous ?", "sequence": "1SA – Passe – ?", "options": ["A) 3♦ (Texas mineur)", "B) 2SA (invitation)", "C) 6SA (grand chelem)", "D) 4SA (quantitative)"], "correct": "D", "comment": "Avec 16 H en face de 15-17 H, le total est 31-33 H. Le 4SA quantitatif invite le grand chelem SA. L'ouvreur accepte (6SA) avec maximum (17 H) et passe avec minimum (15 H). En SEF 2024, le 4SA direct sur 1SA = quantitatif (invitation grand chelem), non Blackwood."}, {"id": 52, "chapter": "Ouverture 1SA", "hand": {"spades": "A9", "hearts": "RD743", "diamonds": "V52", "clubs": "RD4", "hcp": 15, "hld": 16}, "question": "Partenaire ouvre 1SA. Avec 5 cœurs et 16 H, quel est le développement correct ?", "sequence": "1SA – Passe – ?", "options": ["A) 2♦ Texas puis 4♥ (manche)", "B) 4♥ directement", "C) 2♦ Texas puis 3SA", "D) 2♣ Stayman"], "correct": "C", "comment": "Avec 5 cœurs et une force de manche face à 1SA, le développement de référence est Texas cœur puis 3SA. En SEF 2024, après 1SA – 2♦ – 2♥, l'enchère de 3SA montre une main de manche avec 5 cœurs ; 4♥ directe correspond à 6+ cœurs."}, {"id": 53, "chapter": "Ouverture 1SA", "hand": {"spades": "R2", "hearts": "V9", "diamonds": "AD8752", "clubs": "R73", "hcp": 13, "hld": 15}, "question": "Partenaire ouvre 1SA. Sur accord de paire, comment montrez-vous vos 6 carreaux (Texas mineur) ?", "sequence": "1SA – Passe – ?", "options": ["A) 2♠ (Texas ♣)", "B) 3♦ (naturel)", "C) 2SA (Texas ♦)", "D) 3SA (manche)"], "correct": "C", "comment": "En SEF 2024, les transferts mineurs sur 1SA sont une option d'accord de paire. Si la paire les joue, 2SA sert de Texas carreau : l'ouvreur rectifie à 3♦."}, {"id": 54, "chapter": "Ouverture 1SA", "hand": {"spades": "AD82", "hearts": "V73", "diamonds": "RD5", "clubs": "A94", "hcp": 16, "hld": 16}, "question": "Après 1SA – 2♣ Stayman – 2♠, que montre 3SA du répondant ?", "sequence": "1SA – Passe – 2♣ – Passe – 2♠ – Passe – 3SA", "options": ["A) Fit pique invitant", "B) Fit pique de manche", "C) Déni de fit pique, contrat à sans-atout", "D) Demande d'As"], "correct": "C", "comment": "Après 1SA – 2♣ – 2♠, le rebid de 3SA par le répondant dénie le fit pique et fixe le contrat à sans-atout."}, {"id": 55, "chapter": "Ouverture 1SA", "hand": {"spades": "V73", "hearts": "RD5", "diamonds": "A43", "clubs": "RD82", "hcp": 15, "hld": 15}, "question": "Vous ouvrez 1SA avec ce minimum de zone. Partenaire dit 2SA (invitation 8-9 H). Que faites-vous ?", "sequence": "1SA – Passe – 2SA – Passe – ?", "options": ["A) 3SA (maximum 16-17)", "B) Passe (minimum 15)", "C) 3♣ (Stayman différé)", "D) 3♦ (naturel)"], "correct": "B", "comment": "Sur l'invitation 2SA, l'ouvreur accepte avec 16-17 H et passe avec 15 H. Avec ce minimum de la zone 1SA, il faut donc passer."}, {"id": 56, "chapter": "Ouverture 1SA", "hand": {"spades": "A82", "hearts": "RD94", "diamonds": "V63", "clubs": "AV5", "hcp": 15, "hld": 15}, "question": "Vous ouvrez 1SA. Après 2♣ Stayman, vous dites 2♥. Partenaire dit 4♥. Que faites-vous ?", "sequence": "1SA – 2♣ – 2♥ – 4♥ – ?", "options": ["A) Passe (signoff)", "B) 4SA (chelem invite)", "C) 5♥ (fort)", "D) 4♠ (cue-bid)"], "correct": "A", "comment": "Le 4♥ = signoff absolu. Le répondant a décidé unilatéralement d'aller en manche. L'ouvreur doit passer. En SEF 2024, le 4M après Stayman + confirmation de fit = manche décidée par le répondant. Pour sonder le chelem, le répondant ferait un cue-bid ou utiliserait RKCB."}, {"id": 57, "chapter": "Barrages 2♥ 2♠ 3x", "hand": {"spades": "RV98643", "hearts": "5", "diamonds": "V72", "clubs": "D4", "hcp": 7, "hld": 10}, "question": "Quelle est votre ouverture avec cette main ?", "sequence": "", "options": ["A) 2♠ (barrage classique 6 cartes)", "B) 3♠ (barrage 7 cartes)", "C) 1♠ (trop fort pour barrage)", "D) Passe (trop faible)"], "correct": "B", "comment": "7 piques solides, 8 H : ouverture de barrage 3♠. Le SEF 2024 : ouverture 3x = 7 cartes solides, 5-10 H. L'ouverture 2♠ est réservée aux 6 cartes. Ici 7 piques avec RV98643 = 3♠. La longueur de 7 cartes justifie le palier de 3."}, {"id": 58, "chapter": "Barrages 2♥ 2♠ 3x", "hand": {"spades": "A3", "hearts": "RD87642", "diamonds": "V5", "clubs": "82", "hcp": 10, "hld": 13}, "question": "Quelle est votre ouverture ?", "sequence": "", "options": ["A) 2♥ (barrage 6 cartes, 5-10 H)", "B) 1♥ (trop fort pour barrage)", "C) 3♥ (7 cartes)", "D) Passe"], "correct": "A", "comment": "6 cœurs solides RD87642, 10 H : ouverture de barrage 2♥. Le SEF 2024 : 2♥/2♠ = 6 cartes dans la couleur, 5-10 H. Ici 10 H est dans la zone. L'As pique est un 'plus' qui renforce le barrage. On ouvre 2♥ pour occuper le terrain adversaire."}, {"id": 59, "chapter": "Barrages 2♥ 2♠ 3x", "hand": {"spades": "V4", "hearts": "AD2", "diamonds": "RD3", "clubs": "AV952", "hcp": 17, "hld": 18}, "question": "Partenaire ouvre 2♥ (barrage). Vous avez cette main. Que faites-vous ?", "sequence": "2♥ – Passe – ?", "options": ["A) 2SA (OGUST)", "B) 3♥ (soutien)", "C) 4♥ (manche)", "D) 2SA (invitation)"], "correct": "A", "comment": "Avec 18 H en face d'un barrage, on a besoin de précision avant de décider la manche ou le chelem. On utilise 2SA OGUST pour connaître la qualité de la main du barreur. En SEF 2024, 2SA sur un barrage de 2M = OGUST (interrogative forte), non SA naturel."}, {"id": 60, "chapter": "Barrages 2♥ 2♠ 3x", "hand": {"spades": "RD97542", "hearts": "3", "diamonds": "V82", "clubs": "D4", "hcp": 8, "hld": 11}, "question": "En position favorable (non-vul vs vul), quelle est votre ouverture ?", "sequence": "", "options": ["A) 2♠ (classique)", "B) 3♠ (barrage agressif NV)", "C) 1♠", "D) Passe"], "correct": "A", "comment": "En SEF 2024, l'ouverture de 3♠ décrit un barrage de niveau 3 avec 7 cartes solides. Avec 6 piques, l'ouverture de référence reste 2♠ (barrage classique 5-10 H, 6+ cartes)."}, {"id": 61, "chapter": "Barrages 2♥ 2♠ 3x", "hand": {"spades": "A93", "hearts": "RD4", "diamonds": "AV72", "clubs": "D83", "hcp": 16, "hld": 16}, "question": "Quelle ouverture décrit une main de 5-10 H avec 7 cartes solides dans une couleur ?", "sequence": "", "options": ["A) Ouverture de 3 dans la couleur", "B) Ouverture de 2 dans la couleur", "C) Ouverture de 1 dans la couleur", "D) Ouverture de 2♣"], "correct": "A", "comment": "Dans le SEF 2024, les ouvertures de 3♣, 3♦, 3♥ et 3♠ décrivent des barrages de niveau 3 avec 5 à 10 H et 7 cartes solides."}, {"id": 62, "chapter": "Barrages 2♥ 2♠ 3x", "hand": {"spades": "V3", "hearts": "AD97632", "diamonds": "2", "clubs": "RD5", "hcp": 12, "hld": 15}, "question": "Avec cette main, ouvrez-vous 2♥ ou 1♥ ?", "sequence": "", "options": ["A) 2♥ (6 cartes, 5-10 H)", "B) 1♥ (trop fort pour barrage)", "C) 3♥ (7 cartes)", "D) Passe"], "correct": "B", "comment": "13 H avec 7 cœurs : trop fort pour un barrage (limite 10 H). On ouvre 1♥. Le SEF 2024 : barrage 2M = maximum 10 H. Avec 13 H et 7 cœurs, on ouvre 1♥ puis rebide 3♥ pour montrer la force et la longueur. Le barrage serait trompeur sur cette force."}, {"id": 63, "chapter": "Barrages 2♥ 2♠ 3x", "hand": {"spades": "V97532", "hearts": "D4", "diamonds": "A73", "clubs": "82", "hcp": 7, "hld": 9}, "question": "Partenaire ouvre 1♠ (droite). Vous avez cette main. L'adversaire dit Passe. Que faites-vous ?", "sequence": "(1♠) – Passe – ?", "options": ["A) 2♠ (soutien minimum)", "B) 3♠ (barrage préemptif)", "C) 4♠ (barrage extrême)", "D) 1SA (neutre)"], "correct": "B", "comment": "Avec 5 piques et 8 H, le soutien préemptif 3♠ est idéal. En SEF 2024, la réponse 3M sur 1M = barrage préemptif (4+ atouts, 4-8 H). Cette enchère barre les adversaires (surtout si vul) et montre le soutien. 2♠ serait trop faible pour cette main distribué."}, {"id": 64, "chapter": "Barrages 2♥ 2♠ 3x", "hand": {"spades": "RD2", "hearts": "AV93", "diamonds": "V84", "clubs": "D52", "hcp": 13, "hld": 13}, "question": "Adverse ouvre 3♠ (barrage). Que faites-vous ?", "sequence": "(3♠) – ?", "options": ["A) Contre d'appel (4+ cœurs)", "B) 3SA (arrêts)", "C) Passe (trop risqué)", "D) 4♥ (naturel)"], "correct": "A", "comment": "Avec 4 cœurs et 12 H, le contre d'appel sur 3♠ est l'enchère technique. En SEF 2024, le contre sur un barrage de 3x = appel, montrant les couleurs non licitées avec force. Le partenaire répondra dans sa meilleure couleur. 12 H suffit pour contrer un barrage au niveau 3."}, {"id": 65, "chapter": "Ouvertures fortes 2♣ 2SA", "hand": {"spades": "ARV4", "hearts": "AD2", "diamonds": "RD8", "clubs": "AV3", "hcp": 24, "hld": 24}, "question": "Quelle est votre ouverture avec 23 H équilibré ?", "sequence": "", "options": ["A) 2♣ (forte artificielle)", "B) 2SA (22-23 H)", "C) 1SA (trop fort)", "D) 2♠ (natural)"], "correct": "A", "comment": "23 H équilibré : on ouvre 2♣ puis rebide 2SA (22-23 H). En SEF 2024, le 2SA direct à l'ouverture = 20-21 H. Pour 22-23 H, on passe par 2♣ (forte artificielle) puis rebid 2SA. Cela laisse plus d'espace pour les réponses au palier de 3."}, {"id": 66, "chapter": "Ouvertures fortes 2♣ 2SA", "hand": {"spades": "ARD9", "hearts": "AV2", "diamonds": "RD4", "clubs": "RV3", "hcp": 23, "hld": 23}, "question": "Après 2♣ forte artificielle suivi de 2♦ négatif, que montre le rebid 2SA de l'ouvreur ?", "sequence": "2♣ – Passe – 2♦ – Passe – 2SA", "options": ["A) 20-21 H équilibrée", "B) 22-23 H équilibrée", "C) 24-25 H équilibrée", "D) 0-7 H chez l'ouvreur"], "correct": "B", "comment": "Après l'ouverture de 2♣, le rebid de 2SA montre une main équilibrée de 22 à 23 H dans le SEF 2024."}, {"id": 67, "chapter": "Ouvertures fortes 2♣ 2SA", "hand": {"spades": "A2", "hearts": "ARD9832", "diamonds": "ARV", "clubs": "5", "hcp": 21, "hld": 24}, "question": "Avec cette main (8+ levées de jeu), quelle est l'ouverture correcte ?", "sequence": "", "options": ["A) 2♣ (forte artificielle)", "B) 1♥ (puis saut)", "C) 2♥ (barrage fort)", "D) 4♥ (blocage)"], "correct": "A", "comment": "8 levées de jeu certaines (ARQJ en cœurs + ARV en carreaux + A pique) = ouverture 2♣. En SEF 2024, la 2♣ forte est obligatoire avec 8-9 levées de jeu quelle que soit la force en points. Cette main auto-suffisante ouvre 2♣ puis rebide 2♥ (naturel, forcing)."}, {"id": 68, "chapter": "Ouvertures fortes 2♣ 2SA", "hand": {"spades": "V32", "hearts": "D4", "diamonds": "RV852", "clubs": "V73", "hcp": 8, "hld": 9}, "question": "Partenaire ouvre 2♣. Que répondez-vous ?", "sequence": "2♣ – Passe – ?", "options": ["A) 2♦ (réponse négative, 0-7 H)", "B) 2♠ (5+ piques, 8+ H, positif)", "C) 3♦ (5+ carreaux, positif, forcing manche)", "D) Passe (trop faible)"], "correct": "C", "comment": "Sur 2♣, une nouvelle couleur au palier de 3 montre 5+ cartes et une main positive. Avec 5 carreaux et 8 H, 3♦ est la réponse conforme au SEF 2024 ; 2♦ serait réservé à une réponse négative de 0 à 7 H."}, {"id": 69, "chapter": "Ouvertures fortes 2♣ 2SA", "hand": {"spades": "RD943", "hearts": "V72", "diamonds": "A8", "clubs": "V53", "hcp": 11, "hld": 12}, "question": "Partenaire ouvre 2♣. Que répondez-vous ?", "sequence": "2♣ – Passe – ?", "options": ["A) 2♠ (5+ piques, 8+ H, positif)", "B) 2♦ (négatif)", "C) 3♠ (saut, forte)", "D) 2SA (équilibré 8-10)"], "correct": "A", "comment": "Avec 5 piques, As carreaux et 12 H : réponse positive 2♠. En SEF 2024, toute réponse en couleur (autre que 2♦) = positif (8+ H, 5+ cartes). Le 2♠ montre 5 piques et force. L'ouverture 2♣ est forcing jusqu'à la manche sauf dans la séquence 2♣ – 2♦ – 2SA – Passe."}, {"id": 70, "chapter": "Ouvertures fortes 2♣ 2SA", "hand": {"spades": "AV2", "hearts": "RD3", "diamonds": "AV93", "clubs": "RD4", "hcp": 20, "hld": 20}, "question": "Quelle est l'ouverture correcte avec 21 H équilibré ?", "sequence": "", "options": ["A) 2SA (20-21 H)", "B) 2♣ puis rebid 2SA", "C) 1SA (trop fort)", "D) 2♦ (artificielle)"], "correct": "A", "comment": "21 H équilibré : ouverture 2SA directe. En SEF 2024, le 2SA à l'ouverture = 20-21 H équilibré. C'est précis et direct. Pour 22-23 H, on ouvre 2♣ puis rebide 2SA. La distinction est importante pour calibrer les réponses (3♣ Stayman, 3♦/3♥ Texas sur 2SA)."}, {"id": 71, "chapter": "Ouvertures fortes 2♣ 2SA", "hand": {"spades": "D73", "hearts": "AV4", "diamonds": "R82", "clubs": "RD52", "hcp": 15, "hld": 15}, "question": "Partenaire ouvre 2SA (20-21 H). Que répondez-vous ?", "sequence": "2SA – Passe – ?", "options": ["A) 3♣ Stayman (4 cœurs)", "B) 3SA (manche directe)", "C) 4♣ Gerber", "D) Passe (trop faible)"], "correct": "A", "comment": "Avec 4 cœurs et 15 H (manche + possibilité chelem), on utilise Stayman 3♣ sur 2SA pour chercher le fit 4-4 en majeure. En SEF 2024, 3♣ sur 2SA = Stayman (comme 2♣ sur 1SA). Si ouvreur répond 3♥, on sonde le chelem ; si 3♦/3♠, on va en 6SA ou 4♥."}, {"id": 72, "chapter": "Ouvertures fortes 2♣ 2SA", "hand": {"spades": "V9832", "hearts": "D4", "diamonds": "A85", "clubs": "V73", "hcp": 8, "hld": 9}, "question": "Partenaire ouvre 2SA. Que répondez-vous avec 5 piques ?", "sequence": "2SA – Passe – ?", "options": ["A) 3♥ Texas pique (→ 3♠)", "B) 3♠ naturel", "C) 3SA (manche)", "D) 4♠ (direct)"], "correct": "A", "comment": "Sur 2SA, les transferts fonctionnent un cran plus haut : 3♦ = Texas ♥, 3♥ = Texas ♠. Ici 3♥ = Texas pique, l'ouvreur rectifie à 3♠. Le répondant passe avec faible ou continue pour la manche. En SEF 2024, les Texas s'appliquent aussi sur l'ouverture 2SA."}, {"id": 73, "chapter": "Réponses & Développements", "hand": {"spades": "A73", "hearts": "V952", "diamonds": "R84", "clubs": "V73", "hcp": 9, "hld": 9}, "question": "Partenaire ouvre 1♠. Que répondez-vous ?", "sequence": "1♠ – Passe – ?", "options": ["A) 1SA (6-10 H, non-forcing)", "B) 2♣ (2/1 FM)", "C) 2♠ (soutien minimum)", "D) Passe"], "correct": "C", "comment": "Avec 3 piques et 9 H, le soutien direct à 2♠ est conforme au tableau de réponses sur 1♠ : 3+ atouts et 6-9 H. Le soutien direct en majeure est prioritaire dès qu'on dispose du fit."}, {"id": 74, "chapter": "Réponses & Développements", "hand": {"spades": "D2", "hearts": "AV9542", "diamonds": "R83", "clubs": "V4", "hcp": 11, "hld": 13}, "question": "Partenaire ouvre 1♣. Que répondez-vous ?", "sequence": "1♣ – Passe – ?", "options": ["A) 2♥ (5+ cœurs, FM)", "B) 1♥ (6 cœurs, forcing 1 ronde)", "C) 3♥ (saut, fort)", "D) 4♥ (barrage)"], "correct": "A", "comment": "Avec 6 cœurs et 12 H : réponse 2♥ = 2/1 Forcing Manche. En SEF 2024, toute réponse au niveau 2 dans une couleur inférieure sur une ouverture en couleur = Forcing Manche. 2♥ sur 1♣ = 5+ cœurs, FM. On n'utilise pas 1♥ car on a assez de force pour FM."}, {"id": 75, "chapter": "Réponses & Développements", "hand": {"spades": "RD4", "hearts": "AV3", "diamonds": "V72", "clubs": "RD52", "hcp": 12, "hld": 12}, "question": "Partenaire ouvre 1♥. Que répondez-vous avec cette main équilibrée et 3 atouts ?", "sequence": "1♥ – Passe – ?", "options": ["A) 2♦ (2/1 FM)", "B) 2♥ (soutien minimum)", "C) 1SA (non-forcing)", "D) 2SA (invitation)"], "correct": "D", "comment": "Sur 1♥, le SEF 2024 prévoit 2SA avec 11-12 H équilibrés et 3+ atouts : c'est une invitation à la manche. 2♦ en 2/1 exigerait 5+ carreaux, et 2♥ ne montre qu'un soutien limite basse de 6-9 H."}, {"id": 76, "chapter": "Réponses & Développements", "hand": {"spades": "A8", "hearts": "RD942", "diamonds": "V73", "clubs": "RD5", "hcp": 15, "hld": 16}, "question": "Dans la séquence 1♥ – 2♣ – 2♦ – ?, quelle enchère constitue la quatrième couleur forcing explicite du SEF 2024 ?", "sequence": "1♥ – Passe – 2♣ – Passe – 2♦ – Passe – ?", "options": ["A) 2♠", "B) 2SA", "C) 3♥", "D) 3SA"], "correct": "A", "comment": "Le SEF 2024 donne explicitement la séquence 1♥ – 2♣ – 2♦ – 2♠ comme exemple de quatrième couleur forcing, demande de description supplémentaire."}, {"id": 77, "chapter": "Réponses & Développements", "hand": {"spades": "V94", "hearts": "A3", "diamonds": "RD852", "clubs": "D73", "hcp": 12, "hld": 13}, "question": "Partenaire ouvre 1♦. La 4e couleur forcing vous intéresse. Quelle est la séquence ?", "sequence": "1♦ – Passe – 1♠ – Passe – 2♣ – Passe – ?", "options": ["A) 2♥ (4CF, forcing)", "B) 2SA (invitation)", "C) 3♦ (soutien)", "D) 2♦ (naturel)"], "correct": "A", "comment": "Après 1♦ – 1♠ – 2♣, la 4e couleur est 2♥. Le 4CF (Quatrième Couleur Forcing) = enchère artificielle forcing une ronde, demandant à l'ouvreur de décrire davantage. En SEF 2024, le 4CF ne promet aucune carte dans la 4e couleur ; il cherche l'arrêt SA ou le soutien."}, {"id": 78, "chapter": "Réponses & Développements", "hand": {"spades": "RD4", "hearts": "V2", "diamonds": "A8763", "clubs": "RD5", "hcp": 15, "hld": 16}, "question": "Partenaire ouvre 1♥. Que répondez-vous avec un splinter ?", "sequence": "1♥ – Passe – ?", "options": ["A) 4♦ (splinter = soutien 4e + singleton ♦)", "B) 2♦ (2/1 FM)", "C) 3♥ (soutien fort)", "D) 4♥ (manche)"], "correct": "B", "comment": "Cette main ne correspond pas à un splinter : elle ne possède ni soutien 4e à cœur ni singleton/chicane en carreau. La réponse conforme est 2♦, c'est-à-dire un 2/1 forcing manche avec 5+ carreaux et une force suffisante."}, {"id": 79, "chapter": "Réponses & Développements", "hand": {"spades": "AD83", "hearts": "V7", "diamonds": "RD52", "clubs": "V73", "hcp": 13, "hld": 13}, "question": "Partenaire ouvre 1♥. Que répondez-vous avec 4 piques et 14 H ?", "sequence": "1♥ – Passe – ?", "options": ["A) 1♠ (4 piques, forcing 1 ronde)", "B) 2♠ (2/1 FM)", "C) 2♥ (soutien)", "D) 1SA (non-forcing)"], "correct": "A", "comment": "4 piques, 14 H : réponse 1♠ (naturelle, forcing 1 ronde). En SEF 2024, la réponse 1♠ sur 1♥ = 4+ piques, 6+ H, forcing 1 ronde. Ce n'est pas un 2/1 FM (qui serait au niveau 2). Ensuite, on décidera selon le rebid de l'ouvreur."}, {"id": 80, "chapter": "Réponses & Développements", "hand": {"spades": "RD3", "hearts": "AV94", "diamonds": "V72", "clubs": "D83", "hcp": 13, "hld": 13}, "question": "Partenaire ouvre 1SA. Vous utilisez Stayman. Après 1SA – 2♣ – 2♦ (pas de majeure), que rebidez-vous ?", "sequence": "1SA – 2♣ – 2♦ – ?", "options": ["A) 3SA (manche SA)", "B) 2♥ (5 cœurs)", "C) 3♥ (5 cœurs fort)", "D) 2SA (invitation)"], "correct": "A", "comment": "Après Stayman – 2♦ (pas de majeure 4e), avec 13 H on va directement en 3SA. Le rebid 2SA serait une invitation (8-9 H). Ici 13 H = manche certaine. En SEF 2024, après Stayman nié (2♦), le répondant choisit selon sa force : 3SA avec manche, 2SA avec invitation."}, {"id": 81, "chapter": "Réponses & Développements", "hand": {"spades": "A3", "hearts": "RD9832", "diamonds": "V5", "clubs": "AD4", "hcp": 16, "hld": 18}, "question": "Partenaire ouvre 1SA. Vous avez 6 cœurs et 17 H. Quel est le développement idéal ?", "sequence": "1SA – Passe – ?", "options": ["A) 2♦ Texas puis 4SA (quantitatif)", "B) 2♦ Texas puis 4♥ (manche)", "C) 2♦ Texas puis 3♥ (chelem)", "D) 4♥ directement"], "correct": "B", "comment": "Avec 6 cœurs et une force de manche face à 1SA, le développement de référence est Texas cœur puis 4♥. En SEF 2024, l'enchère de 3♥ après rectification du Texas correspond à une invitation avec 8-9 H et 6+ cœurs, pas à une recherche de chelem."}, {"id": 82, "chapter": "Réponses & Développements", "hand": {"spades": "V8432", "hearts": "D7", "diamonds": "AV3", "clubs": "R94", "hcp": 11, "hld": 12}, "question": "Partenaire ouvre 1♣. Que répondez-vous ?", "sequence": "1♣ – Passe – ?", "options": ["A) 1♠ (4+ piques, forcing)", "B) 2♠ (FM)", "C) 1SA (neutre)", "D) 2♣ (soutien)"], "correct": "A", "comment": "5 piques, 12 H : réponse 1♠ (forcing 1 ronde). En SEF 2024, la réponse au niveau 1 en couleur = 6+ H, 4+ cartes, forcing 1 ronde. On ne répond pas 2♣ (soutien = 6-9 H, trop faible) ni 1SA (niait les piques). La priorité est de montrer sa couleur naturellement."}, {"id": 83, "chapter": "Réponses & Développements", "hand": {"spades": "A4", "hearts": "RD3", "diamonds": "AV9832", "clubs": "D5", "hcp": 16, "hld": 18}, "question": "Partenaire ouvre 1♠. Que répondez-vous pour lancer le forcing manche ?", "sequence": "1♠ – Passe – ?", "options": ["A) 2♦ (2/1 FM)", "B) 3♦ (saut, fort)", "C) 2SA (invitation)", "D) 3SA (manche)"], "correct": "A", "comment": "6 carreaux, 17 H : 2♦ = 2/1 FM. En SEF 2024, 2♦ sur 1♠ = Forcing Manche, 5+ carreaux, 10+ H. Ici 6 carreaux avec 17 H : on lance FM immédiatement. Le saut 3♦ serait préemptif dans certains systèmes mais en SEF, 2♦ FM est suffisant pour engager la manche."}, {"id": 84, "chapter": "Réponses & Développements", "hand": {"spades": "R92", "hearts": "AV3", "diamonds": "D84", "clubs": "RD52", "hcp": 15, "hld": 15}, "question": "Partenaire ouvre 1♦. Après 1♦ – 2♣ (2/1 FM) – 2♦ – ?, que rebidez-vous ?", "sequence": "1♦ – Passe – 2♣ – Passe – 2♦ – Passe – ?", "options": ["A) 2SA (équilibré, FM)", "B) 3SA (manche directe)", "C) 3♣ (soutien trèfle)", "D) 3♦ (soutien carreaux)"], "correct": "A", "comment": "Après 2/1 FM, le rebid 2SA = semi-équilibré, forcing. En SEF 2024, 2SA en séquence FM = enchère naturelle descriptive, pas forcément fin de la séquence. On laisse l'espace pour l'ouvreur. 3SA serait prématuré ; 2SA = 'je suis équilibré, à vous de décrire'."}, {"id": 85, "chapter": "Enchères compétitives", "hand": {"spades": "AD73", "hearts": "V852", "diamonds": "A4", "clubs": "D82", "hcp": 13, "hld": 13}, "question": "Adverse ouvre 1♣. Que faites-vous avec cette main ?", "sequence": "(1♣) – ?", "options": ["A) Contre d'appel (majeures 4-4)", "B) 1SA (15-18 H)", "C) Passe (trop risqué)", "D) 2♣ (Michaels)"], "correct": "A", "comment": "Avec 4 piques + 4 cœurs et 13 H : contre d'appel sur 1♣. En SEF 2024, le contre d'appel sur 1♣ = 4-4 en majeures minimum, 12+ H. C'est l'enchère parfaite pour montrer les deux majeures efficacement. Le Michaels sur mineur = bicolore majeur-mineur (pas 4-4 majeures)."}, {"id": 86, "chapter": "Enchères compétitives", "hand": {"spades": "R3", "hearts": "AV9832", "diamonds": "RD5", "clubs": "V4", "hcp": 14, "hld": 16}, "question": "Adverse ouvre 1♠. Que faites-vous ?", "sequence": "(1♠) – ?", "options": ["A) 2♥ (5+ cœurs, 8-18 H)", "B) Contre d'appel", "C) 1SA (arrêts)", "D) Passe"], "correct": "A", "comment": "6 cœurs et 14 H : intervention naturelle 2♥. En SEF 2024, intervention 1/1 = 5+ cartes, 8+ HL minimum (nouveauté : 8 HL au lieu de 9 HL). Intervention 2/1 = 5+ cartes, force variable. Avec 6 cœurs et 14 H, l'intervention 2♥ est standard et non risquée."}, {"id": 87, "chapter": "Enchères compétitives", "hand": {"spades": "AV742", "hearts": "RD9532", "diamonds": "5", "clubs": "3", "hcp": 10, "hld": 13}, "question": "Adverse ouvre 1♦. Quelle est votre enchère ?", "sequence": "(1♦) – ?", "options": ["A) 2♦ Michaels (5+ piques + 5+ cœurs)", "B) 1♠ (5 piques)", "C) 1♥ (5 cœurs)", "D) Contre d'appel"], "correct": "A", "comment": "5 piques + 5 cœurs = Michaels 2♦ ! En SEF 2024, Michaels sur 1♦ = bicolore 5-5+ en majeures (♠ + ♥). C'est l'enchère parfaite pour montrer les deux majeures en un seul coup. Force variable : 8-11 H NV, 12+ H V. Ici 12 H avec belle distribution."}, {"id": 88, "chapter": "Enchères compétitives", "hand": {"spades": "D2", "hearts": "AV5", "diamonds": "AD9843", "clubs": "V3", "hcp": 14, "hld": 16}, "question": "Adverse ouvre 1♠. Que faites-vous ?", "sequence": "(1♠) – ?", "options": ["A) 2♦ (6 carreaux, intervention)", "B) 2SA (UNT, mineures)", "C) Contre d'appel", "D) Passe"], "correct": "A", "comment": "6 carreaux et 15 H : intervention naturelle 2♦. En SEF 2024, on peut intervenir avec 5+ cartes et une main de qualité. Le 2SA UNT (Unusual No Trump) = bicolore mineur 5-5+, mais ici on n'a que 3 trèfles — pas d'UNT. L'intervention 2♦ montre les carreaux naturellement."}, {"id": 89, "chapter": "Enchères compétitives", "hand": {"spades": "V83", "hearts": "AD9732", "diamonds": "5", "clubs": "V82", "hcp": 8, "hld": 10}, "question": "Partenaire ouvre 1♥. La droite dit 2♦. Que faites-vous ?", "sequence": "1♥ – (2♦) – ?", "options": ["A) 2SA (11-15 HLD, 3 atouts — SEF 2024)", "B) 3♥ (barrage)", "C) 2♥ (minimum)", "D) Contre (négatif)"], "correct": "A", "comment": "Avec 3 cœurs et 10-12 H : 2SA fitté après intervention ! Nouveauté majeure du SEF 2024 : après intervention adverse, 2SA = 3 atouts, 11-15 HLD. Ici 10 H + 1 L (6e cœur en HLD) = 12 HLD. Le 2SA décrit parfaitement cette main de soutien intermédiaire."}, {"id": 90, "chapter": "Enchères compétitives", "hand": {"spades": "RD2", "hearts": "A4", "diamonds": "V9732", "clubs": "D82", "hcp": 12, "hld": 13}, "question": "Partenaire ouvre 1♣. La droite dit 1♥. Que faites-vous ?", "sequence": "1♣ – (1♥) – ?", "options": ["A) Contre négatif (4+ piques)", "B) 2♦ (naturel)", "C) 1SA (arrêts)", "D) Passe"], "correct": "A", "comment": "Avec 4+ piques et 11 H : contre Spoutnik (négatif). En SEF 2024, le contre négatif sur intervention adverse = comme un contre d'appel par le répondant. Il montre les couleurs non licitées. Ici il promet 4+ piques et force (7+ H). C'est l'enchère standard en position de Spoutnik."}, {"id": 91, "chapter": "Enchères compétitives", "hand": {"spades": "AV9832", "hearts": "RD4", "diamonds": "V72", "clubs": "3", "hcp": 11, "hld": 13}, "question": "La droite ouvre 2♥ (barrage). Partenaire passe. La gauche dit Passe. En réveil, que faites-vous ?", "sequence": "Passe – (2♥) – Passe – Passe – ?", "options": ["A) Contre de réveil (9-14 H, toutes couleurs)", "B) 2♠ (5+ piques)", "C) Passe (trop risqué)", "D) 3♠ (fort)"], "correct": "B", "comment": "6 piques et 13 H : intervention 2♠ en réveil est parfaite. En SEF 2024, en position de réveil (4e position après deux passes), on peut intervenir légèrement plus léger. 2♠ montre 5+ piques, 8-15 H. C'est plus précis que le contre de réveil (qui montre plusieurs couleurs)."}, {"id": 92, "chapter": "Enchères compétitives", "hand": {"spades": "RD4", "hearts": "A52", "diamonds": "RV873", "clubs": "D3", "hcp": 15, "hld": 16}, "question": "En position directe, sur l'ouverture adverse de 1♠, que montre l'intervention de 1SA ?", "sequence": "(1♠) – 1SA", "options": ["A) 15-18 H équilibrée avec arrêt pique", "B) 11-14 H équilibrée avec arrêt pique", "C) Bicolore mineur 5-5", "D) Contre d'appel avec 4+ cœurs"], "correct": "A", "comment": "En position directe, 1SA sur une ouverture adverse montre une main équilibrée de 15 à 18 H avec arrêt dans la couleur adverse."}, {"id": 93, "chapter": "Enchères compétitives", "hand": {"spades": "V9732", "hearts": "AD4", "diamonds": "R83", "clubs": "V5", "hcp": 11, "hld": 12}, "question": "Partenaire ouvre 1♠. La droite dit 2♣. Vous avez 4 piques. Que faites-vous ?", "sequence": "1♠ – (2♣) – ?", "options": ["A) 2♠ (soutien compétitif)", "B) Contre Spoutnik", "C) 3♠ (barrage préemptif)", "D) 2SA fitté (11-15 HLD, SEF 2024)"], "correct": "B", "comment": "Après 1♠ – (2♣), le SEF 2024 généralise le contre Spoutnik : il remplace le 2SA utilisé auparavant pour montrer certaines mains de fit. Avec 4 piques et la force correspondante, le contre est donc l'enchère de référence dans cette séquence."}, {"id": 94, "chapter": "Enchères compétitives", "hand": {"spades": "AD9742", "hearts": "5", "diamonds": "RD3", "clubs": "V72", "hcp": 12, "hld": 14}, "question": "Après 1♦ – 2♦ Michaels – ?, que montre le cue-bid le plus économique selon le SEF 2024 ?", "sequence": "1♦ – (2♦ Michaels) – ?", "options": ["A) Fit dans la couleur d'ouverture, forcing manche", "B) 5 cartes dans la dernière couleur, forcing manche", "C) Soutien barrage", "D) Main régulière avec arrêt carreau"], "correct": "A", "comment": "Le SEF 2024 redéfinit les cue-bids après Michaels : sur 1♦ – 2♦, le cue-bid le plus économique montre le fit dans la couleur d'ouverture et il est forcing manche."}, {"id": 95, "chapter": "Enchères compétitives", "hand": {"spades": "A3", "hearts": "RD9", "diamonds": "AV852", "clubs": "D73", "hcp": 16, "hld": 17}, "question": "Adverse ouvre 1♠. Que faites-vous avec UNT en vue ?", "sequence": "(1♠) – ?", "options": ["A) 2SA (UNT : 5+ ♥ + 5+ ♦)", "B) 2♦ (6 carreaux)", "C) Contre d'appel", "D) Passe"], "correct": "B", "correct_real": "B", "comment": "Seulement 5 carreaux et 3 cœurs : pas de conditions pour l'UNT (5-5 mineures). On intervient naturellement 2♦. En SEF 2024, l'UNT (2SA) sur intervention majeure = bicolore mineur 5-5+. Avec seulement 3 cœurs, l'UNT serait trompeur. L'intervention 2♦ est la bonne description."}, {"id": 96, "chapter": "Enchères compétitives", "hand": {"spades": "D83", "hearts": "AV6", "diamonds": "RD3", "clubs": "A952", "hcp": 16, "hld": 16}, "question": "La droite ouvre 1♠. Que faites-vous en position directe ?", "sequence": "(1♠) – ?", "options": ["A) 1SA (15-18 H, arrêt pique)", "B) Contre d'appel (3 cœurs)", "C) 2♣ (5 trèfles)", "D) Passe"], "correct": "A", "comment": "16 H équilibré avec arrêt pique (D83) : 1SA en intervention directe. En SEF 2024, l'intervention 1SA sur ouverture adverse = 15-18 H équilibrée avec arrêt dans la couleur adverse. C'est l'équivalent d'une ouverture 1SA. Le contre serait insuffisant avec seulement 3 cœurs."}, {"id": 97, "chapter": "Enchères compétitives", "hand": {"spades": "RD2", "hearts": "V73", "diamonds": "AD9752", "clubs": "8", "hcp": 12, "hld": 14}, "question": "En position de réveil, quelle force montre le contre de réveil ?", "sequence": "Passe – (ouverture adverse) – Passe – Passe – X", "options": ["A) 8-15 H", "B) 9-14 H", "C) 11-14 H équilibrée", "D) 15-18 H équilibrée"], "correct": "B", "comment": "En position de réveil, le contre de réveil demande une force de 9 à 14 H dans le tableau du SEF 2024."}, {"id": 98, "chapter": "Enchères compétitives", "hand": {"spades": "A8", "hearts": "RD9832", "diamonds": "V5", "clubs": "A94", "hcp": 14, "hld": 16}, "question": "Partenaire ouvre 1♣. Adverse dit 1♦. Que faites-vous ?", "sequence": "1♣ – (1♦) – ?", "options": ["A) 1♥ (5+ cœurs, naturel)", "B) Contre Spoutnik", "C) 2♥ (FM)", "D) 1SA (arrêt ♦)"], "correct": "A", "comment": "5 cœurs et 14 H : réponse naturelle 1♥. En SEF 2024, après ouverture de partenaire et intervention adverse, la réponse 1 en couleur reste naturelle et forcing 1 ronde. Le contre Spoutnik serait pour une main sans couleur 5e claire. Ici 5 cœurs = réponse naturelle 1♥."}, {"id": 99, "chapter": "Enchères compétitives", "hand": {"spades": "ARD7", "hearts": "54", "diamonds": "AV983", "clubs": "R2", "hcp": 17, "hld": 18}, "question": "Que montre le contre de support par l'ouvreur après intervention adverse ?", "sequence": "Ouverture majeure – (intervention adverse) – … – X", "options": ["A) 3+ atouts dans la majeure du partenaire et 15-17 H", "B) Main équilibrée 15-18 H avec arrêt", "C) Contre d'appel montrant les couleurs non nommées", "D) Bicolore mineur 5-5"], "correct": "A", "comment": "Le contre de support par l'ouvreur montre 3 atouts ou plus dans la majeure du partenaire avec une main de 15 à 17 H selon le tableau compétitif du SEF 2024."}, {"id": 100, "chapter": "Enchères compétitives", "hand": {"spades": "AV9843", "hearts": "RD2", "diamonds": "V3", "clubs": "R5", "hcp": 14, "hld": 16}, "question": "Partenaire a ouvert 1♠. Vous avez fait 4SA RKCB. Partenaire répond 5♦. Que signifie cette réponse en SEF 2024 ?", "sequence": "1♠ – Passe – 4SA – Passe – 5♦", "options": ["A) 1 ou 4 Key Cards", "B) 0 ou 3 Key Cards", "C) 2 Key Cards sans la Dame d'atout", "D) 2 Key Cards avec la Dame d'atout"], "correct": "B", "comment": "Dans le RKCB 1430 du SEF 2024, la réponse de 5♦ montre 0 ou 3 Key Cards. C'est la seule signification certaine de cette enchère sans information supplémentaire sur la main de l'ouvreur."}];
var L=["A","B","C","D"];
var cur=0;
var ans={};
function ge(id){return document.getElementById(id);}

var SUITS=[
  {k:"spades",  s:"&#9824;",r:false},
  {k:"hearts",  s:"&#9829;",r:true},
  {k:"diamonds",s:"&#9830;",r:true},
  {k:"clubs",   s:"&#9827;",r:false}
];

var CH_SHORT={
  "Pr\u00e9sentation & \u00c9valuation":"\u00c9valuation",
  "Ouvertures mineures 1\u2663 1\u2666":"Mineures",
  "Ouvertures majeures 1\u2665 1\u2660":"Majeures",
  "Ouverture 1SA":"1SA",
  "Barrages 2\u2665 2\u2660 3x":"Barrages",
  "Ouvertures fortes 2\u2663 2SA":"Fortes",
  "R\u00e9ponses & D\u00e9veloppements":"R\u00e9ponses",
  "Ench\u00e8res comp\u00e9titives":"Comp\u00e9titives"
};

function sh(ch){return CH_SHORT[ch]||ch;}

function chapSt(){
  var s={};
  for(var i=0;i<D.length;i++){
    var ch=D[i].chapter;
    if(!s[ch])s[ch]={t:0,a:0,c:0};
    s[ch].t++;
    if(ans[i]!==undefined){s[ch].a++;if(ans[i]===D[i].correct)s[ch].c++;}
  }
  return s;
}

function getSt(){
  var a=0,c=0,k=Object.keys(ans);
  a=k.length;
  for(var i=0;i<k.length;i++){if(ans[+k[i]]===D[+k[i]].correct)c++;}
  return {a:a,c:c};
}

function getChs(){
  var seen={},chs=[];
  for(var i=0;i<D.length;i++){if(!seen[D[i].chapter]){seen[D[i].chapter]=true;chs.push(D[i].chapter);}}
  return chs;
}

function renderCN(){
  var cs=chapSt(),chs=getChs(),h="";
  for(var i=0;i<chs.length;i++){
    var ch=chs[i],st=cs[ch]||{t:0,a:0,c:0};
    var done=st.a===st.t&&st.t>0;
    var active=D[cur].chapter===ch;
    h+="<button class=\"cb"+(active?" active":"")+(done?" done":"")+"\"";
    h+=" data-i=\""+i+"\">"+sh(ch)+" ("+st.c+"/"+st.t+")</button>";
  }
  ge("cn").innerHTML=h;
  var bs=ge("cn").querySelectorAll("button");
  for(var i=0;i<bs.length;i++){
    bs[i].addEventListener("click",(function(ch){return function(){
      for(var j=0;j<D.length;j++){if(D[j].chapter===ch){cur=j;renderQ();break;}}
    };})(chs[+bs[i].getAttribute("data-i")]));
  }
}

function renderJN(){
  var s=Math.max(0,cur-7),e=Math.min(D.length,s+15),h="";
  if(s>0)h+="<button class=\"jb\" data-idx=\"0\">1&#8230;</button>";
  for(var i=s;i<e;i++){
    var a=ans[i];
    var cl=i===cur?"cur":(a!==undefined?(a===D[i].correct?"ok":"ko"):"");
    h+="<button class=\"jb "+cl+"\" data-idx=\""+i+"\">"+(i+1)+"</button>";
  }
  if(e<D.length)h+="<button class=\"jb\" data-idx=\""+(D.length-1)+"\">&#8230;"+D.length+"</button>";
  ge("jn").innerHTML=h;
  var bs=ge("jn").querySelectorAll("button");
  for(var i=0;i<bs.length;i++){
    bs[i].addEventListener("click",(function(idx){return function(){cur=idx;renderQ();};})(+bs[i].getAttribute("data-idx")));
  }
}

function renderSB(){
  var st=getSt();
  ge("s1").textContent=(cur+1)+"/"+D.length;
  ge("s2").textContent=st.c;
  ge("s3").textContent=st.a>0?Math.round(st.c/st.a*100)+"%":"&#8212;";
  ge("s4").textContent=D.length-st.a;
  ge("prog").style.width=Math.round(cur/D.length*100)+"%";
}

function renderQ(){
  var q=D[cur],a=ans[cur];
  renderSB();renderCN();renderJN();

  var handH="";
  for(var i=0;i<SUITS.length;i++){
    var su=SUITS[i];
    var rc=su.r?" red":"";
    var cards=(q.hand&&q.hand[su.k])?q.hand[su.k]:"&#8212;";
    handH+="<div class=\"sb2\"><span class=\"sm"+rc+"\">"+su.s+"</span><span class=\"sc"+rc+"\">"+cards+"</span></div>";
  }
  handH+="<div class=\"hl\">"+(q.hand?q.hand.hcp:"?")+" H &#183; "+(q.hand?q.hand.hld:"?")+" HLD</div>";

  var seqH=q.sequence?"<div class=\"seq\">"+q.sequence+"</div>":"";

  var optsH="";
  var opts=q.options||[];
  for(var i=0;i<opts.length;i++){
    var l=L[i];
    var cls="opt";
    if(a!==undefined){if(l===q.correct)cls+=" ok2";else if(l===a)cls+=" ko2";}
    var dis=a!==undefined?" disabled":"";
    var ck=(a!==undefined&&l===q.correct)?"<span class=\"ck\">&#10003;</span>":"";
    var txt=opts[i].replace(/^[A-D]\)\s*/,"");
    optsH+="<button class=\""+cls+"\""+dis+" data-l=\""+l+"\"><span class=\"lt\">"+l+"</span><span>"+txt+"</span>"+ck+"</button>";
  }

  var cmtCls="cmt"+(a!==undefined?(" show"+(a===q.correct?"":" err")):"");
  var cmtH="";
  if(a!==undefined){
    var ok=a===q.correct;
    var ic=ok?"&#10022; Correct !":"&#10007; Incorrect.";
    var co=ok?"#166534":"#991b1b";
    cmtH="<strong style=\"color:"+co+"\">"+ic+"</strong> "+q.comment;
  }

  var pd=cur===0?" disabled":"";
  var nxt=cur<D.length-1
    ?"<button class=\"nb pr\" id=\"bn\">Suivant &#8594;</button>"
    :"<button class=\"nb pr\" id=\"br\">&#127942; R&#233;sultats</button>";

  ge("qa").innerHTML=
    "<div class=\"qc\">"
    +"<div class=\"qm\"><span class=\"qi\">Q"+(q.id||cur+1)+"</span><span class=\"qch\">"+q.chapter+"</span></div>"
    +"<div class=\"qb\">"
    +"<div class=\"hand\">"+handH+"</div>"
    +seqH
    +"<div class=\"qt\">"+q.question+"</div>"
    +"<div class=\"opts\">"+optsH+"</div>"
    +"<div class=\""+cmtCls+"\">"+cmtH+"</div>"
    +"</div></div>"
    +"<div class=\"nr\">"
    +"<button class=\"nb\" id=\"bp\""+pd+">&#8592; Pr&#233;c&#233;dent</button>"
    +"<span class=\"nc\">"+Object.keys(ans).length+"/"+D.length+" r&#233;pondu</span>"
    +nxt
    +"</div>";

  var obs=ge("qa").querySelectorAll(".opt");
  for(var i=0;i<obs.length;i++){
    obs[i].addEventListener("click",(function(letter){return function(){
      if(ans[cur]!==undefined)return;
      ans[cur]=letter;renderQ();
    };})(obs[i].getAttribute("data-l")));
  }
  var bp=ge("bp");if(bp)bp.addEventListener("click",function(){if(cur>0){cur--;renderQ();}});
  var bn=ge("bn");if(bn)bn.addEventListener("click",function(){if(cur<D.length-1){cur++;renderQ();}});
  var br=ge("br");if(br)br.addEventListener("click",showRes);
}

function showRes(){
  var st=getSt();
  var pct=Math.round(st.c/D.length*100);
  var men=pct>=85?"Excellent &#8212; Ma&#238;tre SEF 2024 !"
    :pct>=70?"Tr&#232;s bien jou&#233; !"
    :pct>=55?"Bien &#8212; quelques r&#233;visions s'imposent."
    :pct>=40?"Moyen &#8212; r&#233;visez les bases SEF."
    :"&#192; retravailler &#8212; relisez le SEF 2024.";
  var cs=chapSt(),chs=getChs(),cards="";
  for(var i=0;i<chs.length;i++){
    var ch=chs[i],s=cs[ch]||{t:0,a:0,c:0};
    var p=s.a>0?Math.round(s.c/s.a*100):0;
    var cl=p>=80?"gr":p>=60?"go":"gp";
    cards+="<div class=\"rc "+cl+"\"><div class=\"rn\">"+sh(ch)+"</div><div class=\"rv\">"+s.c+"/"+s.a+" &#183; "+p+"%</div></div>";
  }
  ge("prog").style.width="100%";
  ge("qa").style.display="none";
  ge("jn").style.display="none";
  var r=ge("rs");
  r.innerHTML=
    "<div class=\"rs\">"+pct+"%</div>"
    +"<div class=\"rm\">"+st.c+" / "+D.length+" correctes &#8212; "+men+"</div>"
    +"<div class=\"rg\">"+cards+"</div>"
    +"<div class=\"ra\">"
    +"<button class=\"nb pr\" id=\"brst\">&#8635; Recommencer</button>"
    +"<button class=\"nb\" id=\"bwr\">Revoir erreurs</button>"
    +"<button class=\"nb\" id=\"bal\">Équivalent tout revoir</button>"
    +"</div>";
  r.classList.add("show");
  ge("brst").addEventListener("click",function(){
    ans={};cur=0;ge("qa").style.display="";ge("jn").style.display="";
    ge("rs").classList.remove("show");renderQ();
  });
  ge("bwr").addEventListener("click",function(){
    var f=-1;
    for(var i=0;i<D.length;i++){if(ans[i]!==undefined&&ans[i]!==D[i].correct){f=i;break;}}
    cur=f>=0?f:0;ge("qa").style.display="";ge("jn").style.display="";
    ge("rs").classList.remove("show");renderQ();
  });
  ge("bal").addEventListener("click",function(){
    cur=0;ge("qa").style.display="";ge("jn").style.display="";
    ge("rs").classList.remove("show");renderQ();
  });
}

renderQ();
</script>
</body>
</html>
